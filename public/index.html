<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Video Scraper</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <h1>🎬 Short Video Scraper</h1>

    <div class="controls">
        <input type="text" id="query" placeholder="Search for short videos..." value="labubu">
        <select id="count">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15">15</option>
        </select>
        <button id="searchBtn">Search</button>
    </div>

    <p id="status"></p>

    <div class="download-bar" id="download">
        <button id="downloadBtn">⬇ Download All</button>
    </div>

    <div id="results" class="grid"></div>

    <script src="app.js" defer></script>
</body>

</html>
